<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Product preview card component</title>
</head>
<body>
    <main>
        <section class="product-card">
            <img class="pc-product-image" src="images/image-product-desktop.jpg" alt="pc-product-image">
            <div class="text">
                <p class="perfume">PERFUME</p>
                <p class="header">Gabrielle Essence Eau De Parfum</p>
                <p class="main-text">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfurmer-Creator for the House of CHANEL.</p>
                <div class="price-section">
                    <p class="discounted-price">$149.99</p>
                    <p class="normal-price">$169.99</p>
                </div>
                <button class="add-to-cart">🛒 Add to Cart</button>
            </div>

        </section>
    </main>
</body>
</html>
